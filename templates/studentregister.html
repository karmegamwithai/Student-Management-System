<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="h-screen w-screen bg-gradient-to-tr from-violet-600 via-fuchsia-500 to-pink-500 flex items-center justify-center p-4 overflow-hidden m-0">

    <!-- Form Container with subtle gradient border look -->
    <div class="w-full max-w-xl bg-white rounded-2xl shadow-2xl p-6 my-auto max-h-[95vh] flex flex-col justify-between border border-white/20">

        <!-- Title featuring a Pink to Violet text gradient -->
        <h2 class="text-2xl font-bold text-center bg-gradient-to-r from-pink-500 to-violet-600 bg-clip-text text-transparent mb-4 tracking-tight">
            Student Registration
        </h2>

        <form action="/savetodbstudent" method="post" class="space-y-3.5">

            <!-- Row: First Name & Last Name -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                        <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        First Name
                    </label>
                    <input type="text" name="fname" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 placeholder-gray-400 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none">
                </div>

                <div>
                    <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                        <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Last Name
                    </label>
                    <input type="text" name="lname" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 placeholder-gray-400 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none">
                </div>
            </div>

            <!-- Date of Birth -->
            <div>
                <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Date of Birth
                </label>
                <input type="date" name="dob" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none">
            </div>

            <!-- Gender -->
            <div>
                <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Gender
                </label>
                <div class="flex items-center gap-6 p-2 bg-gray-50 rounded-lg border border-gray-200">
                    <label class="inline-flex items-center cursor-pointer text-gray-600 text-xs font-medium">
                        <input type="radio" name="gender" value="Male" class="w-3.5 h-3.5 text-fuchsia-500 border-gray-300 focus:ring-fuchsia-400">
                        <span class="ml-2">Male</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer text-gray-600 text-xs font-medium">
                        <input type="radio" name="gender" value="Female" class="w-3.5 h-3.5 text-fuchsia-500 border-gray-300 focus:ring-fuchsia-400">
                        <span class="ml-2">Female</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer text-gray-600 text-xs font-medium">
                        <input type="radio" name="gender" value="Other" class="w-3.5 h-3.5 text-fuchsia-500 border-gray-300 focus:ring-fuchsia-400">
                        <span class="ml-2">Other</span>
                    </label>
                </div>
            </div>

            <!-- Row: Email & Phone -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                        <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Email Address
                    </label>
                    <input type="email" name="email" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 placeholder-gray-400 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none">
                </div>

                <div>
                    <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                        <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        Phone Number
                    </label>
                    <input type="tel" name="phone" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 placeholder-gray-400 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none">
                </div>
            </div>

            <!-- Address -->
            <div>
                <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Address
                </label>
                <textarea rows="2" name="address" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 placeholder-gray-400 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none resize-none"></textarea>
            </div>

            <!-- Course Selection -->
            <div>
                <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v7"></path></svg>
                    Course
                </label>
                <select name="course" class="w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-fuchsia-400 focus:border-fuchsia-400 transition-all outline-none appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23a21caf%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.6rem_auto] bg-[right_1rem_center] bg-no-repeat">
                    <option class="text-gray-400">Select Course</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Electronics</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                </select>
            </div>

            <!-- Hobbies -->
            <div>
                <label class="flex items-center text-xs font-semibold text-gray-600 mb-1">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    Hobbies
                </label>
                <div class="flex items-center gap-6 p-2 bg-gray-50 rounded-lg border border-gray-200">
                    <label class="inline-flex items-center cursor-pointer text-gray-600 text-xs font-medium">
                        <input type="checkbox" name="hobbies" value="Sports" class="w-3.5 h-3.5 text-fuchsia-500 border-gray-300 rounded focus:ring-fuchsia-400">
                        <span class="ml-2">Sports</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer text-gray-600 text-xs font-medium">
                        <input type="checkbox" name="hobbies" value="Reading" class="w-3.5 h-3.5 text-fuchsia-500 border-gray-300 rounded focus:ring-fuchsia-400">
                        <span class="ml-2">Reading</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer text-gray-600 text-xs font-medium">
                        <input type="checkbox" name="hobbies" value="Music" class="w-3.5 h-3.5 text-fuchsia-500 border-gray-300 rounded focus:ring-fuchsia-400">
                        <span class="ml-2">Music</span>
                    </label>
                </div>
            </div>

            <!-- Action Buttons with solid gradient styling -->
            <div class="flex items-center justify-end space-x-3 pt-3 border-t border-gray-100">
                <button type="reset" value="Clear" class="px-5 py-2 rounded-lg text-xs font-semibold text-red-900 bg-gray-100 hover:bg-red-200 cursor-pointer border border-gray-200 transition-all active:scale-95 outline-none">Clear</button>
                <button type="submit" value="Register" class="px-5 py-2 rounded-lg text-xs font-semibold text-white bg-gradient-to-r from-pink-500 to-violet-600 hover:from-pink-600 hover:to-violet-700 shadow-md hover:shadow-lg cursor-pointer transition-all active:scale-95 outline-none">Register</button>
            </div>

        </form>

    </div>

</body>
</html>
